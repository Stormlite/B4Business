name: Daily Prediction and Retraining Pipeline

on:
  schedule:
    - cron: '0 1 * * *' # Runs everyday at 4:00 AM UTC
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Forces Git to download full branch history to make rebasing successful

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Today's Matches & Update DB
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }} # 🌟 Securely linked odds aggregation key
        run: |
          python -m data.collector --fetch-today

      - name: Retrain Model Automatically
        run: |
          python -m models.train --train

      - name: Run Historical Backtest Evaluation Check
        run: |
          python scripts/backtest.py

      - name: Dispatch High-Value WhatsApp Alerts to Phone
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TARGET_WHATSAPP_NUMBER: ${{ secrets.TARGET_WHATSAPP_NUMBER }}
        run: |
          python scripts/notify.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Track all model artefacts and data — glob instead of a hardcoded list so
          # newly added markets (e.g. over05_model.joblib) don't get left unstaged
          # and block the rebase below.
          git add data/matches.duckdb models/*.joblib

          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Automated Daily Update: Multi-Market Predictive Engines [skip ci]"

            # Pull/push against the branch that triggered this run, not a hardcoded
            # 'master' — otherwise a manual workflow_dispatch run on a feature
            # branch would push its automated commit straight onto master.
            git pull origin "${GITHUB_REF_NAME}" --rebase -X theirs
            git push origin HEAD:"${GITHUB_REF_NAME}"
          else
            echo "ℹ️ No adjustments or profile updates detected across database files. Skipping commit node."
          fi
