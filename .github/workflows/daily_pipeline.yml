name: Daily Prediction and Retraining Pipeline

on:
  schedule:
    - cron: '0 4 * * *' # Runs everyday at 4:00 AM UTC
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Forces Git to download full branch history to make rebasing successful

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # 🌟 FIXED: Removed the cache line completely to bypass the string support error

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Today's Matches & Update DB
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python -m data.collector --fetch-today

      - name: Retrain Model Automatically
        run: |
          python -m models.train --train

      - name: Run Historical Backtest Evaluation Check
        run: |
          python scripts/backtest.py

      - name: Dispatch High-Value WhatsApp Alerts to Phone
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TARGET_WHATSAPP_NUMBER: ${{ secrets.TARGET_WHATSAPP_NUMBER }}
        run: |
          python scripts/notify.py

      # - name: Commit and Push Changes
      #   run: |
      #     git config --global user.name "github-actions[bot]"
      #     git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
      #     # Stage the explicit dual model artifacts and analytical log changes
      #     git add data/matches.duckdb models/over25_model.joblib models/btts_model.joblib
          
      #     # Check if changes actually exist before committing
      #     if ! git diff --quiet || ! git diff --staged --quiet; then
      #       git commit -m "Automated Daily Update: DB & Models [skip ci]"
            
      #       # Pull down any recent manual VS Code commits and rebase before pushing
      #       git pull origin master --rebase -X theirs
            
      #       git push origin master
      #     else
      #       echo "ℹ️ No adjustments or profile updates detected across database files. Skipping commit node."
      #     fi
      # ... (Keep all setup steps up to retraining the same)

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          # 🌟 UPDATED: Added models/outcome_model.joblib to the commit step array
          git add data/matches.duckdb models/over25_model.joblib models/btts_model.joblib models/outcome_model.joblib
          
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Automated Daily Update: Multi-Market Predictive Engines [skip ci]"
            git pull origin master --rebase -X theirs
            git push origin master
          fi

